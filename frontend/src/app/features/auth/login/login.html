<div class="container py-5" style="min-height: 70vh;">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h3 class="text-center mb-0">Connexion</h3>
        </div>
        <div class="card-body">
          <form>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="exemple@email.com">
            </div>
            <div class="mb-3">
              <label class="form-label">Mot de passe</label>
              <input type="password" class="form-control" placeholder="Votre mot de passe">
            </div>
            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
          </form>
          <div class="text-center mt-3">
            <a routerLink="/register">Pas encore de compte ? S'inscrire</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
