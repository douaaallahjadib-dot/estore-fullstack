<div class="container py-5">
  <h2 class="mb-4" style="color: #8B5E3C;">✅ Validation de commande</h2>
  
  <div class="row">
    <div class="col-md-7">
      <div class="card">
        <div class="card-header" style="background-color: #D4A373; color: white;">
          <h5 class="mb-0">📝 Informations de livraison</h5>
        </div>
        <div class="card-body">
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Nom complet *</label>
                <input type="text" class="form-control" [(ngModel)]="order.fullName" name="fullName" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" [(ngModel)]="order.email" name="email" required>
              </div>
              <div class="col-md-12 mb-3">
                <label class="form-label">Téléphone</label>
                <input type="tel" class="form-control" [(ngModel)]="order.phone" name="phone">
              </div>
              <div class="col-md-12 mb-3">
                <label class="form-label">Adresse *</label>
                <input type="text" class="form-control" [(ngModel)]="order.address" name="address" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Ville *</label>
                <input type="text" class="form-control" [(ngModel)]="order.city" name="city" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Code postal</label>
                <input type="text" class="form-control" [(ngModel)]="order.zipCode" name="zipCode">
              </div>
            </div>
            
            <h6 class="mt-3 mb-3">💳 Mode de paiement</h6>
            <div class="mb-3">
              <div class="form-check">
                <input class="form-check-input" type="radio" value="card" [(ngModel)]="order.paymentMethod" name="paymentMethod" id="card">
                <label class="form-check-label" for="card">💳 Carte bancaire (Visa/Mastercard)</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" value="paypal" [(ngModel)]="order.paymentMethod" name="paymentMethod" id="paypal">
                <label class="form-check-label" for="paypal">💰 PayPal</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" value="cod" [(ngModel)]="order.paymentMethod" name="paymentMethod" id="cod">
                <label class="form-check-label" for="cod">📦 Paiement à la livraison</label>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    
    <div class="col-md-5">
      <div class="card" style="background-color: #FFF5F0;">
        <div class="card-header" style="background-color: #D4A373; color: white;">
          <h5 class="mb-0">🛒 Récapitulatif</h5>
        </div>
        <div class="card-body">
          <div *ngFor="let item of cartItems" class="d-flex justify-content-between mb-2">
            <span>{{ item.name }} x {{ item.quantity }}</span>
            <span>{{ item.price * item.quantity }} DH</span>
          </div>
          <hr>
          <div class="d-flex justify-content-between mb-2">
            <strong>Sous-total</strong>
            <strong>{{ totalPrice }} DH</strong>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span>Livraison</span>
            <span class="text-success">Gratuite</span>
          </div>
          <hr>
          <div class="d-flex justify-content-between mb-3">
            <span class="fs-5 fw-bold">Total</span>
            <span class="fs-4 fw-bold" style="color: #FF69B4;">{{ totalPrice }} DH</span>
          </div>
          <button class="btn w-100" style="background-color: #FF69B4; color: white;" (click)="submitOrder()">
            ✅ Confirmer ma commande
          </button>
          <button class="btn w-100 mt-2" style="background-color: #D4A373; color: white;" routerLink="/cart">
            ← Retour au panier
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
