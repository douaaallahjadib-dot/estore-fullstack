<div class="container py-5" style="min-height: 60vh;">
  <div class="row">
    <div class="col-md-4">
      <div class="card text-center">
        <div class="card-body">
          <div style="font-size: 64px;">👤</div>
          <h4 class="mt-2" style="color: #8B5E3C;">{{ user?.nom || 'Utilisateur' }}</h4>
          <p class="text-muted">{{ user?.email }}</p>
        </div>
      </div>
    </div>
    
    <div class="col-md-8">
      <div class="card">
        <div class="card-header" style="background-color: #D4A373; color: white;">
          <h5 class="mb-0">✏️ Modifier mes informations</h5>
        </div>
        <div class="card-body">
          <app-profile-form [user]="user" [userId]="userId"></app-profile-form>
        </div>
      </div>
    </div>
  </div>
</div>
