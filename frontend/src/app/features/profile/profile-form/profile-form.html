<div *ngIf="message" class="alert alert-success">
  {{ message }}
</div>

<form (ngSubmit)="onSubmit()">
  <div class="mb-3">
    <label class="form-label">👤 Nom complet</label>
    <input type="text" class="form-control" [(ngModel)]="formData.nom" name="nom">
  </div>
  
  <div class="mb-3">
    <label class="form-label">📧 Email</label>
    <input type="email" class="form-control" [(ngModel)]="formData.email" name="email">
  </div>
  
  <div class="mb-3">
    <label class="form-label">📍 Adresse</label>
    <input type="text" class="form-control" [(ngModel)]="formData.adresse" name="adresse">
  </div>
  
  <div class="mb-3">
    <label class="form-label">📞 Téléphone</label>
    <input type="tel" class="form-control" [(ngModel)]="formData.telephone" name="telephone">
  </div>
  
  <button type="submit" class="btn w-100" [disabled]="isLoading" style="background-color: #D4A373; color: white;">
    {{ isLoading ? '⏳ Enregistrement...' : '💾 Enregistrer' }}
  </button>
</form>
